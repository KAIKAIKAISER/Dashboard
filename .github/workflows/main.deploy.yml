name: Deploy Doc Website
on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  main-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup node
        uses: actions/setup-node@v4

      - name: Install dependencies
        run: yarn

      - name: Build Demo
        run: yarn build
      
      - name: Build extension files
        run: yarn build:extension

      - name: Package ZIP file
        run: yarn package:zip

      - name: Upload ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: howdz-dashboard-zip
          path: dist/howdz-dashboard.zip
          if-no-files-found: error

      - name: Publish latest ZIP release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete latest --cleanup-tag --yes || true
          gh release create latest dist/howdz-dashboard.zip \
            --target "$GITHUB_SHA" \
            --title "Latest Dashboard ZIP" \
            --notes "Automatically built from commit $GITHUB_SHA."
      
      #- name: Build Electorn file
      #  run: yarn build:electron

      - name: Deploy
        uses: JamesIves/github-pages-deploy-action@3.7.1
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: gh-pages
          FOLDER: dist
