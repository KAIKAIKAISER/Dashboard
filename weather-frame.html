<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <title>METAR / TAF weather</title>
    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: transparent;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      #metartaf-weather {
        box-sizing: border-box;
        display: grid;
        width: 100%;
        height: 100%;
        padding: 12px;
        place-items: center;
        border-radius: 6px;
        background: rgba(0, 0, 0, 0.14);
        color: #f5f7fa;
        text-align: center;
        text-decoration: none;
        text-shadow: 0 1px 3px rgba(0, 0, 0, 0.5);
      }
    </style>
  </head>
  <body>
    <a
      id="metartaf-weather"
      href="https://metar-taf.com/"
      target="_blank"
      rel="noopener noreferrer"
    >Open METAR / TAF weather</a>
    <script src="./weather-frame.js"></script>
  </body>
</html>
